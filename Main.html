<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg: #0f172a;
      --card: #0b1220;
      --accent: #7c3aed;
      --muted: #94a3b8;
      --glass: rgba(255,255,255,0.03);
    }
    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:linear-gradient(180deg,#071024 0%, #081124 100%); color:#e6eef8}/* Music box container at top-left */
.music-box{
  position:fixed;
  top:16px;
  left:16px;
  width:280px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.04);
  border-radius:12px;
  padding:14px;
  box-shadow:0 8px 24px rgba(2,6,23,0.6);
  backdrop-filter: blur(6px);
}

.header{display:flex;align-items:center;gap:10px}
.logo{
  width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.18)
}

.title{font-size:14px;font-weight:600}
.subtitle{font-size:11px;color:var(--muted);margin-top:2px}

/* screen */
.screen{
  margin-top:12px;padding:10px;border-radius:8px;background:var(--glass);border:1px solid rgba(255,255,255,0.02)
}
.track-title{font-size:13px;font-weight:600}
.track-meta{font-size:11px;color:var(--muted);margin-top:4px}

/* progress */
.progress-wrap{display:flex;align-items:center;gap:8px;margin-top:10px}
.time{font-size:11px;color:var(--muted);width:36px;text-align:center}
.progress{flex:1;height:8px;background:rgba(255,255,255,0.04);border-radius:6px;position:relative;cursor:pointer}
.progress > .bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#06b6d4);border-radius:6px}

/* controls */
.controls{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:12px}
.btn{background:transparent;border:0;padding:8px;border-radius:8px;cursor:pointer;color:#000000}
.btn:active{transform:translateY(1px)}
.btn .icon{font-size:16px}
.btn.big{padding:10px;border-radius:10px}

.stop{color:#ff6b6b}

.footer{margin-top:10px;font-size:11px;color:var(--muted);text-align:center}

@media (max-width:360px){.music-box{left:8px;right:8px;width:auto}}

  </style>
</head>
<body>
  <aside class="music-box" aria-label="Music box widget">
    <div class="header">
      <div>
        <div class="title">Music Box</div>
        <div class="subtitle"></div>
      </div>
    </div><div class="screen" role="region" aria-live="polite">
    <div class="track-title" id="trackTitle">No track loaded</div>
  <div class="track-meta" id="trackMeta">—</div>
  <div class="progress-wrap">
    <div class="time" id="timeCurrent">0:00</div>
    <div class="progress" id="progress">
      <div class="bar" id="progressBar"></div>
    </div>
    <div class="time" id="timeDuration">0:00</div>
  </div>
</div>

<div class="controls" role="group" aria-label="Player controls">
  <button class="btn" id="btnPrev" title="Back" aria-label="Back">
    <span class="icon">⏮️</span>
  </button>
  <button class="btn big" id="btnPlay" title="Play/Pause" aria-label="Play or pause">
    <span class="icon" id="playIcon">▶️</span>
  </button>
  <button class="btn" id="btnNext" title="Next" aria-label="Next">
    <span class="icon">⏭️</span>
  </button>
  <button class="btn stop" id="btnStop" title="Stop" aria-label="Stop">
    <span class="icon">⏹️</span>
  </button>
</div>

<audio id="audio" preload="metadata"></audio>

  </aside>  <script>
    const playlist = [
      {src: 'ZCaptainJack.mp3', title: 'Captain Jack', artist: 'Captain Jack (Hardstyle Remix)'},
      {src: 'ZDevil in Disguise.mp3', title: 'Devil in Disguise', artist: 'Marino Devil in Disguise'}
    ];

    const audio = document.getElementById('audio');
    const trackTitle = document.getElementById('trackTitle');
    const trackMeta = document.getElementById('trackMeta');
    const btnPlay = document.getElementById('btnPlay');
    const playIcon = document.getElementById('playIcon');
    const btnNext = document.getElementById('btnNext');
    const btnPrev = document.getElementById('btnPrev');
    const btnStop = document.getElementById('btnStop');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeDuration = document.getElementById('timeDuration');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');

    let idx = 0;
    let isPlaying = false;
    let raf = null;

    function fmt(t){
      if (!isFinite(t)) return '0:00';
      const m = Math.floor(t/60); const s = Math.floor(t%60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    function loadTrack(i){
      idx = (i + playlist.length) % playlist.length;
      const item = playlist[idx];
      audio.src = item.src;
      audio.load();
      trackTitle.textContent = item.title || 'Unknown title';
      trackMeta.textContent = item.artist ? item.artist : 'Unknown artist';
      timeCurrent.textContent = '0:00';
      timeDuration.textContent = '…';
      progressBar.style.width = '0%';
    }

    function play(){
      audio.play().then(()=>{
        isPlaying = true; playIcon.textContent = '⏸️';
        startUpdateLoop();
      }).catch(err=>{
        // Autoplay blockers: fallback to user-interaction required
        console.warn('Play failed (browser may require interaction):', err);
      });
    }
    function pause(){
      audio.pause(); isPlaying=false; playIcon.textContent='▶️'; stopUpdateLoop();
    }
    function stop(){
      audio.pause(); audio.currentTime=0; isPlaying=false; playIcon.textContent='▶️'; updateProgress(); stopUpdateLoop();
    }

    btnPlay.addEventListener('click', ()=>{
      if(!audio.src) loadTrack(0);
      if(isPlaying) pause(); else play();
    });

    btnNext.addEventListener('click', ()=>{ loadTrack(idx+1); if(isPlaying) play(); });
    btnPrev.addEventListener('click', ()=>{ loadTrack(idx-1); if(isPlaying) play(); });
    btnStop.addEventListener('click', stop);

    // When metadata is loaded set duration
    audio.addEventListener('loadedmetadata', ()=>{
      timeDuration.textContent = fmt(audio.duration);
    });

    // When track ends -> next
    audio.addEventListener('ended', ()=>{ loadTrack(idx+1); play(); });

    // Click on progress to seek
    progress.addEventListener('click', (e)=>{
      if(!audio.duration) return;
      const rect = progress.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
      updateProgress();
    });

    function updateProgress(){
      const cur = audio.currentTime || 0;
      const dur = audio.duration || 0;
      timeCurrent.textContent = fmt(cur);
      timeDuration.textContent = dur ? fmt(dur) : '…';
      const pct = dur ? (cur/dur)*100 : 0;
      progressBar.style.width = pct + '%';
    }

    function startUpdateLoop(){
      stopUpdateLoop();
      (function loop(){
        updateProgress();
        raf = requestAnimationFrame(loop);
      })();
    }
    function stopUpdateLoop(){ if(raf) cancelAnimationFrame(raf); raf = null; }

    // Initialize first track but do not auto-play
    if(playlist.length) loadTrack(0);

    // Accessibility keyboard shortcuts
    document.addEventListener('keydown', (e)=>{
      if(document.activeElement && ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if(e.key === ' '){ e.preventDefault(); btnPlay.click(); }
      if(e.key === 'ArrowRight') btnNext.click();
      if(e.key === 'ArrowLeft') btnPrev.click();
      if(e.key.toLowerCase() === 's') btnStop.click();
    });
  </script></body>
</html>
